name: NeSy Hyperparameter Tuner V5.1
description: Launches a Katib experiment for NeSy models using config-driven training scripts.
inputs:
  - name: config_json
    type: String
    description: Full model configuration JSON (model name is read from here)

  - name: X_data_cdn
    type: String
    description: CDN URL of X (features) dataset — passed directly to each trial pod

  - name: y_data_cdn
    type: String
    default: ""
    description: CDN URL of y (labels) dataset — leave empty if not applicable

  - name: docker_image
    type: String
    description: Docker image to use for both the component container and each trial pod

  - name: parameters_to_tune
    type: Data
    description: List of parameter specs to tune (Katib V1beta1ParameterSpec format as JSON)

  - name: objective_metric_name
    type: String
    description: Metric name Katib will optimize (e.g., val_loss, accuracy, f1_score, metric, silhouette_score)

  - name: objective_type
    type: String
    description: Objective type (e.g., maximize, minimize)

  - name: objective_goal
    type: String
    description: Target goal value for the metric (e.g., 0.99)

  - name: algorithm_name
    type: String
    default: bayesianoptimization
    description: Search algorithm (e.g., random, grid, tpe, bayesianoptimization, hyperband)

  - name: early_stopping_algorithm
    type: String
    default: medianstop
    description: Early stopping algorithm (e.g., medianstop, truncation, none)

  - name: max_trial_count
    type: Integer
    default: '4'
    description: Maximum number of trials

  - name: parallel_trial_count
    type: Integer
    default: '2'
    description: Number of trials to run in parallel

  - name: max_failed_trial_count
    type: Integer
    default: '2'
    description: Maximum number of failed trials

  - name: namespace
    type: String
    default: "admin"
    description: Kubernetes namespace to launch the Katib experiment in

  - name: cpu_limit
    type: String
    default: "1"
    description: CPU limit for each trial pod (e.g., "1", "2", "500m")

  - name: memory_limit
    type: String
    default: "2Gi"
    description: Memory limit for each trial pod (e.g., "2Gi", "4Gi", "512Mi")

  - name: gpu_limit
    type: String
    default: "0"
    description: Number of GPUs per trial pod. "0" = CPU only, "1" or more = GPU.

outputs:
  - name: best_hyperparams
    type: String
    description: Best parameter set found by Katib

  - name: payload
    type: String
    description: All trial results with parameters and metrics

  - name: schema_json
    type: String
    description: Trial results formatted to match HPT schema

implementation:
  container:
    image: kumar2004/katib-test:14
    command:
      - python3
      - -u
      - -c
      - |
        import argparse
        import json
        import os
        import re
        import time
        import uuid
        from kubernetes import client, config
        import kubeflow.katib as katib
        from kubeflow.katib import (
            V1beta1AlgorithmSpec,
            V1beta1Experiment,
            V1beta1ExperimentSpec,
            V1beta1ObjectiveSpec,
            V1beta1ParameterSpec,
            V1beta1EarlyStoppingSpec,
            V1beta1TrialTemplate,
            V1beta1MetricsCollectorSpec,
            V1beta1FileSystemPath,
        )

        # ── Keys handled explicitly — not via generic extra_sections loop ──
        FIXED_ARCH_KEYS     = [
            "input_dim", "feature_dim", "output_dim",
            "batch_norm", "encoder_batch_norm", "decoder_batch_norm",
            "bidirectional", "learn_init_hidden",
        ]
        FIXED_TRAINING_KEYS = ["epochs", "early_stopping"]

        # ── Sections handled explicitly — excluded from generic loop ───
        KNOWN_SECTIONS = {
            "architecture", "training", "optimizer",
            "data", "noise", "loss", "model",
        }

        # ── Params never passed as CLI args ────────────────────────────
        SKIP_FIXED = {"save_path", "x_path", "y_path"}

        print("=== KATIB TUNER V5: STARTING ===")

        # ── Load Kubernetes config ─────────────────────────────────────
        try:
            config.load_incluster_config()
            print("DEBUG: Loaded in-cluster k8s config")
        except Exception as e:
            print("DEBUG: In-cluster config failed, trying kube config...")
            config.load_kube_config()
            print("DEBUG: Loaded kube config")

        # ── Parse arguments ────────────────────────────────────────────
        parser = argparse.ArgumentParser()
        parser.add_argument("--config_json",              type=str,   required=True)
        parser.add_argument("--X_data_cdn",               type=str,   required=True)
        parser.add_argument("--y_data_cdn",               type=str,   default="")
        parser.add_argument("--docker_image",             type=str,   required=True)
        parser.add_argument("--parameters_to_tune",       type=str,   required=True)
        parser.add_argument("--objective_metric_name",    type=str,   required=True)
        parser.add_argument("--objective_type",           type=str,   required=True)
        parser.add_argument("--objective_goal",           type=float, required=True)
        parser.add_argument("--algorithm_name",           type=str,   required=True)
        parser.add_argument("--early_stopping_algorithm", type=str,   required=True)
        parser.add_argument("--max_trial_count",          type=int,   required=True)
        parser.add_argument("--parallel_trial_count",     type=int,   required=True)
        parser.add_argument("--max_failed_trial_count",   type=int,   required=True)
        parser.add_argument("--namespace",                type=str,   default="admin")
        parser.add_argument("--cpu_limit",                type=str,   default="1")
        parser.add_argument("--memory_limit",             type=str,   default="2Gi")
        parser.add_argument("--gpu_limit",                type=str,   default="0")
        parser.add_argument("--best_hyperparams",         type=str,   required=True)
        parser.add_argument("--payload",                  type=str,   required=True)
        parser.add_argument("--schema_json",              type=str,   required=True)
        args = parser.parse_args()

        namespace = args.namespace
        gpu_count = int(args.gpu_limit)
        use_gpu   = gpu_count > 0
        print("DEBUG: namespace="    + namespace)
        print("DEBUG: cpu_limit="    + args.cpu_limit)
        print("DEBUG: memory_limit=" + args.memory_limit)
        print("DEBUG: gpu_limit="    + args.gpu_limit + " (enabled=" + str(use_gpu) + ")")

        # ── Clean CDN URLs ─────────────────────────────────────────────
        def clean_url(url):
            return re.sub(r'\s+', '', url)

        X_data_cdn     = clean_url(args.X_data_cdn)
        y_data_cdn     = clean_url(args.y_data_cdn)
        y_cdn_provided = (
            bool(y_data_cdn) and
            y_data_cdn.lower() not in ("none", "null", "n/a", "na", "")
        )
        print("DEBUG: X_data_cdn=" + X_data_cdn)
        print("DEBUG: y_cdn_provided=" + str(y_cdn_provided))

        # ── Parse config ───────────────────────────────────────────────
        config_dict = json.loads(args.config_json)
        model_name  = config_dict.get("model", "").strip().lower()
        if not model_name:
            raise ValueError("'model' key not found in config_json")
        print("DEBUG: model_name=" + model_name)

        # ── Parse parameters_to_tune ───────────────────────────────────
        params_input  = json.loads(args.parameters_to_tune)
        tunable_names = {p["name"] for p in params_input}
        print("DEBUG: " + str(len(params_input)) + " parameters to tune: " + str(list(tunable_names)))

        # ── Build Katib parameter specs ────────────────────────────────
        parameters = []
        for p in params_input:
            parameters.append(V1beta1ParameterSpec(
                name=p["name"],
                parameter_type=p["parameter_type"],
                feasible_space=p["feasible_space"],
            ))
            print("  ✓ param: " + p["name"])

        # ── Metrics collector ──────────────────────────────────────────
        metrics_collector = V1beta1MetricsCollectorSpec(
            source={
                "fileSystemPath": V1beta1FileSystemPath(
                    path="/katib/mnist.json",
                    kind="File",
                    format="TEXT",
                )
            },
            collector={"kind": "File"},
        )

        experiment_name = model_name.replace("_", "-") + "-" + str(uuid.uuid4())[:8]
        print("DEBUG: experiment_name=" + experiment_name)

        # ── Objective / algorithm / early stopping ─────────────────────
        objective_spec      = V1beta1ObjectiveSpec(
            type=args.objective_type,
            goal=args.objective_goal,
            objective_metric_name=args.objective_metric_name,
        )
        algorithm_spec      = V1beta1AlgorithmSpec(algorithm_name=args.algorithm_name)
        early_stopping_spec = V1beta1EarlyStoppingSpec(algorithm_name=args.early_stopping_algorithm)

        # ── Pull config sections ───────────────────────────────────────
        arch             = config_dict.get("architecture", {})
        training         = config_dict.get("training",     {})
        optimizer_config = config_dict.get("optimizer",    {})
        data_config      = config_dict.get("data",         {})

        # ── Collect all extra sections (svm, regression, knn,
        #    clustering, etc.) into a single flat dict ──────────────────
        extra_sections = {}
        for section_key, section_val in config_dict.items():
            if section_key not in KNOWN_SECTIONS and isinstance(section_val, dict):
                extra_sections.update(section_val)
                print("DEBUG: loaded extra section: " + section_key +
                      " (" + str(len(section_val)) + " keys)")

        trial_parameters = []
        trial_args       = []

        # ── 1. Fixed architecture params ───────────────────────────────
        for key in FIXED_ARCH_KEYS:
            if key in arch and key not in tunable_names:
                trial_args.extend(["--" + key, str(arch[key])])
                print("DEBUG: fixed arch: " + key + "=" + str(arch[key]))

        # ── 2. Fixed training params ───────────────────────────────────
        for key in FIXED_TRAINING_KEYS:
            if key in training and key not in tunable_names:
                trial_args.extend(["--" + key, str(training[key])])
                print("DEBUG: fixed training: " + key + "=" + str(training[key]))

        # ── 3. Fixed optimizer name ────────────────────────────────────
        optimizer_name = optimizer_config.get("optimizer") or optimizer_config.get("name")
        if optimizer_name and "optimizer" not in tunable_names:
            trial_args.extend(["--optimizer", str(optimizer_name)])
            print("DEBUG: fixed optimizer=" + str(optimizer_name))

        # ── 4. Fixed num_workers ───────────────────────────────────────
        if "num_workers" in data_config and "num_workers" not in tunable_names:
            trial_args.extend(["--num_workers", str(data_config["num_workers"])])
            print("DEBUG: fixed num_workers=" + str(data_config["num_workers"]))

        # ── 5. Fixed params from all other sections ────────────────────
        #    Rules (mirror of search space generator):
        #      scalar value  → pass as fixed CLI arg
        #      [x]           → single list = fixed → pass that value as CLI arg
        #      [x, y, ...]   → multiple list = tunable → skip here (Katib injects)
        #      true          → tunable → skip here (Katib injects)
        #      false / null  → skip entirely
        def extract_fixed_value(val):
            if val is None:
                return False, None
            if isinstance(val, bool):
                # true  = tunable flag (Katib handles)
                # false = skip
                return False, None
            if isinstance(val, list):
                if len(val) == 1:
                    # single list = fixed
                    return True, str(val[0])
                else:
                    # multiple list = tunable (Katib handles)
                    return False, None
            # raw scalar (int / float / str)
            return True, str(val)

        for key, val in extra_sections.items():
            if key in tunable_names:
                continue    # Katib will inject this
            if key in SKIP_FIXED:
                continue
            should_pass, cli_value = extract_fixed_value(val)
            if should_pass:
                trial_args.extend(["--" + key, cli_value])
                print("DEBUG: fixed extra: " + key + "=" + cli_value)
            else:
                print("DEBUG: skipping extra (tunable/null/bool): " + key)

        # ── 6. Tunable params — injected by Katib per trial ───────────
        for p in params_input:
            param_name = p["name"]
            trial_parameters.append({
                "name":        param_name,
                "description": param_name,
                "reference":   param_name,
            })
            trial_args.extend(["--" + param_name,
                                "${trialParameters." + param_name + "}"])
            print("DEBUG: tunable: " + param_name)

        # ── 7. Dataset URLs ────────────────────────────────────────────
        if not X_data_cdn:
            raise ValueError("X_data_cdn is empty — cannot pass --x_path to trial")
        trial_args.extend(["--x_path", X_data_cdn])
        if y_cdn_provided:
            trial_args.extend(["--y_path", y_data_cdn])

        full_trial_args = ["--model", model_name] + trial_args
        print("DEBUG: total trial args=" + str(len(full_trial_args)))
        print("DEBUG: full_trial_args=" + str(full_trial_args))

        # ── Resource limits ────────────────────────────────────────────
        resource_limits = {
            "cpu":    args.cpu_limit,
            "memory": args.memory_limit,
        }
        if use_gpu:
            resource_limits["nvidia.com/gpu"] = str(gpu_count)
        print("DEBUG: resource_limits=" + str(resource_limits))

        # ── Trial template ─────────────────────────────────────────────
        trial_template = V1beta1TrialTemplate(
            retain=True,
            primary_container_name="training-container",
            trial_parameters=trial_parameters,
            trial_spec={
                "apiVersion": "batch/v1",
                "kind": "Job",
                "spec": {
                    "ttlSecondsAfterFinished": 86400,
                    "template": {
                        "metadata": {
                            "annotations": {"sidecar.istio.io/inject": "false"}
                        },
                        "spec": {
                            "containers": [
                                {
                                    "name":            "training-container",
                                    "image":           args.docker_image,
                                    "imagePullPolicy": "Always",
                                    "command":         ["python"],
                                    "args":            ["-u", "main.py"] + full_trial_args,
                                    "resources": {
                                        "limits":   resource_limits,
                                        "requests": resource_limits,
                                    },
                                }
                            ],
                            "restartPolicy": "Never",
                        }
                    }
                }
            },
        )

        # ── Create experiment ──────────────────────────────────────────
        experiment_spec = V1beta1ExperimentSpec(
            objective=objective_spec,
            algorithm=algorithm_spec,
            parameters=parameters,
            trial_template=trial_template,
            metrics_collector_spec=metrics_collector,
            max_trial_count=args.max_trial_count,
            parallel_trial_count=args.parallel_trial_count,
            max_failed_trial_count=args.max_failed_trial_count,
            early_stopping=early_stopping_spec,
        )

        katib_client = katib.KatibClient(namespace=namespace)
        experiment   = V1beta1Experiment(
            api_version="kubeflow.org/v1beta1",
            kind="Experiment",
            metadata=client.V1ObjectMeta(name=experiment_name, namespace=namespace),
            spec=experiment_spec,
        )

        try:
            katib_client.create_experiment(experiment)
            print("DEBUG: Experiment created successfully!")
        except Exception as e:
            print("DEBUG: Failed to create experiment: " + str(e))
            raise

        # ── Wait for completion ────────────────────────────────────────
        try:
            katib_client.wait_for_experiment_condition(
                name=experiment_name,
                namespace=namespace,
                timeout=10800,
            )
            print("DEBUG: Experiment completed!")
        except Exception as e:
            print("DEBUG: Wait failed: " + str(e))

        # ── Collect trial results ──────────────────────────────────────
        try:
            trials = katib_client.list_trials(experiment_name, namespace)
            print("DEBUG: Found " + str(len(trials)) + " trials")
        except Exception as e:
            print("DEBUG: Failed to list trials: " + str(e))
            trials = []

        def auto_cast(value):
            if isinstance(value, str):
                if value.lower() in ["true", "false"]:
                    return value.lower() == "true"
                if value.isdigit() or (value.startswith("-") and value[1:].isdigit()):
                    return int(value)
                try:
                    return float(value)
                except ValueError:
                    return value
            return value

        payload_data = []
        for idx, trial in enumerate(trials, start=1):
            trial_data = {
                "model_name": model_name + "_trial" + str(idx) + "_" + str(uuid.uuid4())[:8],
                "timestamp":  int(time.time() * 1000) + idx,
            }
            if hasattr(trial, "spec") and hasattr(trial.spec, "parameter_assignments"):
                for param in trial.spec.parameter_assignments:
                    trial_data[param.name] = auto_cast(param.value)
            if (
                hasattr(trial, "status") and
                hasattr(trial.status, "observation") and
                trial.status.observation and
                hasattr(trial.status.observation, "metrics") and
                trial.status.observation.metrics
            ):
                trial_data["metrics_value"] = [
                    {m.name: auto_cast(m.latest)}
                    for m in trial.status.observation.metrics
                ]
            else:
                trial_data["metrics_value"] = []
            payload_data.append(trial_data)
            print("DEBUG: Trial " + str(idx) + " collected")

        # ── Save payload ───────────────────────────────────────────────
        os.makedirs(os.path.dirname(args.payload) or ".", exist_ok=True)
        with open(args.payload, "w") as f:
            json.dump(payload_data, f, indent=2)
        print("DEBUG: Payload saved with " + str(len(payload_data)) + " trial(s)")

        # ── Build schema_json ──────────────────────────────────────────
        SCHEMA_SKIP_KEYS = {"model_name", "model_type", "timestamp", "metrics_value"}
        base_ts     = int(time.time() * 1000)
        schema_data = []
        for idx, trial_row in enumerate(payload_data, start=1):
            schema_row = {}
            schema_row["model_name"]    = experiment_name + "_trial" + str(idx) + "_" + str(uuid.uuid4())[:8]
            schema_row["model_type"]    = model_name
            schema_row["timestamp"]     = base_ts + idx
            for k, v in trial_row.items():
                if k not in SCHEMA_SKIP_KEYS:
                    schema_row[k] = v
            schema_row["metrics_value"] = trial_row.get("metrics_value", [])
            schema_data.append(schema_row)
            print("DEBUG: schema_row " + str(idx) +
                  " → model_name=" + schema_row["model_name"] +
                  " timestamp="    + str(schema_row["timestamp"]))

        os.makedirs(os.path.dirname(args.schema_json) or ".", exist_ok=True)
        with open(args.schema_json, "w") as f:
            json.dump(schema_data, f, indent=2)
        print("DEBUG: schema_json saved with " + str(len(schema_data)) + " row(s)")

        # ── Best hyperparameters ───────────────────────────────────────
        try:
            best = katib_client.get_optimal_hyperparameters(
                name=experiment_name, namespace=namespace
            )
            hp_dict = (
                {p.name: auto_cast(p.value) for p in best.parameter_assignments}
                if best and hasattr(best, "parameter_assignments")
                else {}
            )
            print("DEBUG: Best hyperparameters: " + str(hp_dict))
        except Exception as e:
            print("DEBUG: Failed to get best hyperparameters: " + str(e))
            hp_dict = {}

        os.makedirs(os.path.dirname(args.best_hyperparams) or ".", exist_ok=True)
        with open(args.best_hyperparams, "w") as f:
            json.dump(hp_dict, f, indent=2)

        print("=== KATIB TUNER V5: COMPLETED ===")

    args:
      - --config_json
      - {inputValue: config_json}
      - --X_data_cdn
      - {inputValue: X_data_cdn}
      - --y_data_cdn
      - {inputValue: y_data_cdn}
      - --docker_image
      - {inputValue: docker_image}
      - --parameters_to_tune
      - {inputValue: parameters_to_tune}
      - --objective_metric_name
      - {inputValue: objective_metric_name}
      - --objective_type
      - {inputValue: objective_type}
      - --objective_goal
      - {inputValue: objective_goal}
      - --algorithm_name
      - {inputValue: algorithm_name}
      - --early_stopping_algorithm
      - {inputValue: early_stopping_algorithm}
      - --max_trial_count
      - {inputValue: max_trial_count}
      - --parallel_trial_count
      - {inputValue: parallel_trial_count}
      - --max_failed_trial_count
      - {inputValue: max_failed_trial_count}
      - --namespace
      - {inputValue: namespace}
      - --cpu_limit
      - {inputValue: cpu_limit}
      - --memory_limit
      - {inputValue: memory_limit}
      - --gpu_limit
      - {inputValue: gpu_limit}
      - --best_hyperparams
      - {outputPath: best_hyperparams}
      - --payload
      - {outputPath: payload}
      - --schema_json
      - {outputPath: schema_json}
