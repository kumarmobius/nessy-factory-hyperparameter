name: NeSy Hyperparameter Tuner V1.2
description: Launches a Katib experiment for NeSy models using config-driven training scripts.
inputs:
  - name: projectid
    type: String
    description: Name or ID of the use case

  - name: config_json
    type: String
    description: Full model configuration JSON (model name is read from here)

  - name: X_data_cdn
    type: String
    description: CDN URL of X (features) dataset — passed directly to each trial pod

  - name: y_data_cdn
    type: String
    default: ""
    description: CDN URL of y (labels) dataset — leave empty if not applicable

  - name: parameters_to_tune
    type: Data
    description: List of parameter specs to tune (Katib V1beta1ParameterSpec format as JSON)

  - name: objective_metric_name
    type: String
    description: Metric name Katib will optimize (e.g., val_loss, accuracy, f1_score)

  - name: objective_type
    type: String
    description: Objective type (e.g., maximize, minimize)

  - name: objective_goal
    type: String
    description: Target goal value for the metric (e.g., 0.99)

  - name: algorithm_name
    type: String
    default: bayesianoptimization
    description: Search algorithm (e.g., random, grid, tpe, bayesianoptimization, hyperband)

  - name: early_stopping_algorithm
    type: String
    default: medianstop
    description: Early stopping algorithm (e.g., medianstop, truncation, none)

  - name: max_trial_count
    type: Integer
    default: '4'
    description: Maximum number of trials

  - name: parallel_trial_count
    type: String
    default: '2'
    description: Number of trials to run in parallel

  - name: max_failed_trial_count
    type: String
    default: '2'
    description: Maximum number of failed trials

outputs:
  - name: best_hyperparams
    type: JsonArray
    description: Best parameter set found by Katib

  - name: payload
    type: String
    description: All trial results with parameters and metrics

implementation:
  container:
    image: kumar2004/katib-test:3
    command:
      - python3
      - -u
      - -c
      - |
        import argparse
        import json
        import os
        import time
        import uuid
        import base64
        from kubernetes import client, config
        import kubeflow.katib as katib
        from kubeflow.katib import (
            V1beta1AlgorithmSpec,
            V1beta1Experiment,
            V1beta1ExperimentSpec,
            V1beta1ObjectiveSpec,
            V1beta1ParameterSpec,
            V1beta1EarlyStoppingSpec,
            V1beta1TrialTemplate,
            V1beta1MetricsCollectorSpec,
            V1beta1FileSystemPath,
        )

        # ── Model name → training script mapping ──────────────────────
        TRAIN_SCRIPT_MAP = {
            "denoise_ae": "train_scripts/train_dae.py",
            "rnn":        "train_scripts/train_rnn.py",
            "gru":        "train_scripts/train_gru.py",
            "vae":        "train_scripts/train_vae.py",
            "mask_ae":    "train_scripts/train_masked_ae.py",
        }

        print("=== KATIB TUNER: STARTING COMPONENT ===")

        # ── Load Kubernetes config ─────────────────────────────────────
        try:
            config.load_incluster_config()
            print("DEBUG: Loaded in-cluster k8s config")
        except Exception as e:
            print(f"DEBUG: In-cluster config failed ({e}), trying kube config...")
            config.load_kube_config()
            print("DEBUG: Loaded kube config")

        # ── Argument parsing ───────────────────────────────────────────
        parser = argparse.ArgumentParser()
        parser.add_argument("--projectid",                type=str,   required=True)
        parser.add_argument("--config_json",              type=str,   required=True)
        parser.add_argument("--X_data_cdn",               type=str,   required=True)
        parser.add_argument("--y_data_cdn",               type=str,   default="")
        parser.add_argument("--parameters_to_tune",       type=str,   required=True)
        parser.add_argument("--objective_metric_name",    type=str,   required=True)
        parser.add_argument("--objective_type",           type=str,   required=True)
        parser.add_argument("--objective_goal",           type=float, required=True)
        parser.add_argument("--algorithm_name",           type=str,   required=True)
        parser.add_argument("--early_stopping_algorithm", type=str,   required=True)
        parser.add_argument("--max_trial_count",          type=int,   required=True)
        parser.add_argument("--parallel_trial_count",     type=int,   required=True)
        parser.add_argument("--max_failed_trial_count",   type=int,   required=True)
        parser.add_argument("--best_hyperparams",         type=str,   required=True)
        parser.add_argument("--payload",                  type=str,   required=True)
        args = parser.parse_args()

        namespace = "admin"

        # ── Resolve model name and training script from config ─────────
        print("=== DEBUG: PARSING CONFIG_JSON ===")
        config_dict = json.loads(args.config_json)
        model_name  = config_dict.get("model", "").strip().lower()
        if not model_name:
            raise ValueError("'model' key not found in config_json")

        train_script = TRAIN_SCRIPT_MAP.get(model_name)
        if not train_script:
            raise ValueError(
                f"Unknown model '{model_name}'. "
                f"Supported: {list(TRAIN_SCRIPT_MAP.keys())}"
            )

        print(f"DEBUG: model_name={model_name}")
        print(f"DEBUG: train_script={train_script}")

        cfg_b64 = base64.b64encode(args.config_json.encode("utf-8")).decode("utf-8")

        # ── Decide whether y_data_cdn is provided ─────────────────────
        y_cdn_provided = args.y_data_cdn.strip() != ""
        print(f"DEBUG: X_data_cdn={args.X_data_cdn}")
        print(f"DEBUG: y_data_cdn={'provided → ' + args.y_data_cdn if y_cdn_provided else 'NOT provided — will be omitted from trial args'}")

        # ── Parse parameters_to_tune ───────────────────────────────────
        print("=== DEBUG: PARSING PARAMETERS_TO_TUNE ===")
        params_input = json.loads(args.parameters_to_tune)
        print(f"DEBUG: {len(params_input)} parameters to tune:")
        for i, p in enumerate(params_input):
            print(f"  {i+1}. {p.get('name')} [{p.get('parameter_type')}] → {p.get('feasible_space')}")

        # ── Build Katib parameter specs ────────────────────────────────
        print("=== DEBUG: CREATING PARAMETER SPECS ===")
        parameters = []
        for p in params_input:
            param_spec = V1beta1ParameterSpec(
                name=p["name"],
                parameter_type=p["parameter_type"],
                feasible_space=p["feasible_space"]
            )
            parameters.append(param_spec)
            print(f"  ✓ {p['name']}")

        # ── Metrics collector ──────────────────────────────────────────
        metrics_collector = V1beta1MetricsCollectorSpec(
            source={
                "fileSystemPath": V1beta1FileSystemPath(
                    path="/katib/mnist.json",
                    kind="File",
                    format="JSON"
                )
            },
            collector={"kind": "File"}
        )

        # ── Experiment identifiers ─────────────────────────────────────
        experiment_name = f"{model_name}-{str(uuid.uuid4())[:8]}"
        print(f"DEBUG: Experiment name: {experiment_name}")

        # ── Objective & algorithm ──────────────────────────────────────
        objective_spec = V1beta1ObjectiveSpec(
            type=args.objective_type,
            goal=args.objective_goal,
            objective_metric_name=args.objective_metric_name
        )
        algorithm_spec      = V1beta1AlgorithmSpec(algorithm_name=args.algorithm_name)
        early_stopping_spec = V1beta1EarlyStoppingSpec(algorithm_name=args.early_stopping_algorithm)

        # ── Build trial parameters and args ───────────────────────────
        print("=== DEBUG: BUILDING TRIAL TEMPLATE ===")
        trial_parameters = []
        trial_args       = []

        # Tunable hyperparameters — injected by Katib per trial
        for p in params_input:
            param_name = p["name"]
            trial_parameters.append({
                "name":        param_name,
                "description": param_name,
                "reference":   param_name
            })
            trial_args.extend([
                "--" + param_name,
                "${trialParameters." + param_name + "}"
            ])
            print(f"  ✓ Trial param: {param_name}")

        # Fixed args — same for every trial
        trial_args.extend(["--config",   cfg_b64])
        trial_args.extend(["--X_data_cdn", args.X_data_cdn])

        # Only pass y_data_cdn if it was actually provided
        if y_cdn_provided:
            trial_args.extend(["--y_data_cdn", args.y_data_cdn])
            print("DEBUG: y_data_cdn will be passed to trial args")
        else:
            print("DEBUG: y_data_cdn is empty — NOT passed to trial args")

        print(f"DEBUG: Final trial args: {trial_args}")

        trial_template = V1beta1TrialTemplate(
            retain=True,
            primary_container_name="training-container",
            trial_parameters=trial_parameters,
            trial_spec={
                "apiVersion": "batch/v1",
                "kind": "Job",
                "spec": {
                    "ttlSecondsAfterFinished": 86400,
                    "template": {
                        "metadata": {
                            "annotations": {
                                "sidecar.istio.io/inject": "false"
                            }
                        },
                        "spec": {
                            "containers": [
                                {
                                    "name":    "training-container",
                                    "image":   "kumar2004/katib-test:3",
                                    "command": ["python", train_script],
                                    "args":    trial_args,
                                    "resources": {
                                        "limits": {"cpu": "2", "memory": "4Gi"}
                                    }
                                }
                            ],
                            "restartPolicy": "Never"
                        }
                    }
                }
            }
        )

        # ── Assemble and launch experiment ─────────────────────────────
        print("=== DEBUG: CREATING EXPERIMENT ===")
        experiment_spec = V1beta1ExperimentSpec(
            objective=objective_spec,
            algorithm=algorithm_spec,
            parameters=parameters,
            trial_template=trial_template,
            metrics_collector_spec=metrics_collector,
            max_trial_count=args.max_trial_count,
            parallel_trial_count=args.parallel_trial_count,
            max_failed_trial_count=args.max_failed_trial_count,
            early_stopping=early_stopping_spec
        )

        katib_client = katib.KatibClient(namespace=namespace)

        experiment = V1beta1Experiment(
            api_version="kubeflow.org/v1beta1",
            kind="Experiment",
            metadata=client.V1ObjectMeta(name=experiment_name, namespace=namespace),
            spec=experiment_spec
        )

        try:
            katib_client.create_experiment(experiment)
            print("DEBUG: Experiment created successfully!")
        except Exception as e:
            print(f"DEBUG: Failed to create experiment: {e}")
            print(json.dumps(experiment.to_dict(), indent=2, default=str))
            raise

        # ── Wait for completion ────────────────────────────────────────
        print("=== DEBUG: WAITING FOR EXPERIMENT COMPLETION ===")
        try:
            katib_client.wait_for_experiment_condition(
                name=experiment_name, namespace=namespace, timeout=10800
            )
            print("DEBUG: Experiment completed!")
        except Exception as e:
            print(f"DEBUG: Wait failed: {e}")

        # ── Collect trial results ──────────────────────────────────────
        print("=== DEBUG: FETCHING TRIALS ===")
        try:
            trials = katib_client.list_trials(experiment_name, namespace)
            print(f"DEBUG: Found {len(trials)} trials")
        except Exception as e:
            print(f"DEBUG: Failed to list trials: {e}")
            trials = []

        def auto_cast(value: str):
            if value.lower() in ["true", "false"]:
                return value.lower() == "true"
            if value.isdigit() or (value.startswith('-') and value[1:].isdigit()):
                return int(value)
            try:
                return float(value)
            except ValueError:
                return value

        payload_data = []
        for idx, trial in enumerate(trials, start=1):
            trial_data = {}
            trial_data["projectId"]   = args.projectid.strip()
            trial_data["model_name"]  = f"{model_name}_trial{idx}_{str(uuid.uuid4())[:8]}"
            trial_data["timestamp"]   = int(time.time() * 1000)

            if hasattr(trial, "spec") and hasattr(trial.spec, "parameter_assignments"):
                for param in trial.spec.parameter_assignments:
                    trial_data[param.name] = auto_cast(param.value)
                    print(f"DEBUG: Trial {idx} | {param.name} = {param.value}")

            if (hasattr(trial, "status") and
                hasattr(trial.status, "observation") and
                trial.status.observation and
                hasattr(trial.status.observation, "metrics") and
                trial.status.observation.metrics):
                trial_data["metrics_value"] = [
                    {m.name: auto_cast(m.latest)}
                    for m in trial.status.observation.metrics
                ]
            else:
                trial_data["metrics_value"] = []

            payload_data.append(trial_data)

        payload = {"data": payload_data}
        print(f"DEBUG: Payload has {len(payload_data)} trial(s)")

        os.makedirs(os.path.dirname(args.payload) or ".", exist_ok=True)
        with open(args.payload, "w") as f:
            json.dump(payload, f)

        # ── Best hyperparameters ───────────────────────────────────────
        print("=== DEBUG: GETTING BEST HYPERPARAMETERS ===")
        try:
            best    = katib_client.get_optimal_hyperparameters(name=experiment_name, namespace=namespace)
            hp_dict = {p.name: auto_cast(p.value) for p in best.parameter_assignments} if best and hasattr(best, "parameter_assignments") else {}
            print(f"DEBUG: Best hyperparameters: {hp_dict}")
        except Exception as e:
            print(f"DEBUG: Failed to get best hyperparameters: {e}")
            hp_dict = {}

        os.makedirs(os.path.dirname(args.best_hyperparams) or ".", exist_ok=True)
        with open(args.best_hyperparams, "w") as f:
            json.dump(hp_dict, f, indent=2)

        print("=== DEBUG: COMPONENT COMPLETED ===")

    args:
      - --projectid
      - {inputValue: projectid}
      - --config_json
      - {inputValue: config_json}
      - --X_data_cdn
      - {inputValue: X_data_cdn}
      - --y_data_cdn
      - {inputValue: y_data_cdn}
      - --parameters_to_tune
      - {inputValue: parameters_to_tune}
      - --objective_metric_name
      - {inputValue: objective_metric_name}
      - --objective_type
      - {inputValue: objective_type}
      - --objective_goal
      - {inputValue: objective_goal}
      - --algorithm_name
      - {inputValue: algorithm_name}
      - --early_stopping_algorithm
      - {inputValue: early_stopping_algorithm}
      - --max_trial_count
      - {inputValue: max_trial_count}
      - --parallel_trial_count
      - {inputValue: parallel_trial_count}
      - --max_failed_trial_count
      - {inputValue: max_failed_trial_count}
      - --best_hyperparams
      - {outputPath: best_hyperparams}
      - --payload
      - {outputPath: payload}
