name: Search Space Generator for Katib V6.1
inputs:
  - {name: model_config, type: String}
  - {name: max_n_layers, type: Integer, optional: true, default: "4"}

outputs:
  - {name: search_space, type: Data}

implementation:
  container:
    image: kumar2004/katib-test:6
    command:
      - python3
      - -u
      - -c
      - |
        import argparse, json, os, sys, logging
        from itertools import product

        parser = argparse.ArgumentParser()
        parser.add_argument('--model_config', required=True)
        parser.add_argument('--max_n_layers', type=int, default=4)
        parser.add_argument('--search_space', required=True)
        args = parser.parse_args()

        logging.basicConfig(stream=sys.stdout, level=logging.INFO)
        logger = logging.getLogger("search_space_generator")

        UNITS = [16, 32, 64, 128, 256, 512, 1024, 2048, 4096]

        def generate_encoder_dims(max_layers):
            dims_set = set()
            for n_layers in range(1, max_layers + 1):
                for combo in product(UNITS, repeat=n_layers):
                    if all(combo[i] >= combo[i+1] for i in range(len(combo)-1)):
                        dims_set.add(",".join(str(u) for u in combo))
            return sorted(dims_set, key=lambda x: (len(x.split(",")), x))

        def generate_decoder_dims(max_layers):
            dims_set = set()
            for n_layers in range(1, max_layers + 1):
                for combo in product(UNITS, repeat=n_layers):
                    if all(combo[i] <= combo[i+1] for i in range(len(combo)-1)):
                        dims_set.add(",".join(str(u) for u in combo))
            return sorted(dims_set, key=lambda x: (len(x.split(",")), x))

        max_n = args.max_n_layers
        encoder_hidden_options = generate_encoder_dims(max_n)
        decoder_options        = generate_decoder_dims(max_n)
        logger.info("Encoder/hidden options: %d | Decoder options: %d",
                    len(encoder_hidden_options), len(decoder_options))

        ACTIVATIONS = ["relu", "leaky_relu", "gelu", "tanh", "sigmoid", "elu"]

        # ── Predefined ranges — used only when value = true ────────────
        DOUBLE_PARAMS = {
            # ── Deep learning ──────────────────────────────────────── #
            "lr":                           {"min": "0.00001",  "max": "0.1"},
            "learning_rate":                {"min": "0.00001",  "max": "0.1"},
            "weight_decay":                 {"min": "0.000001", "max": "0.01"},
            "dropout":                      {"min": "0.01",     "max": "0.5"},
            "encoder_dropout":              {"min": "0.01",     "max": "0.5"},
            "decoder_dropout":              {"min": "0.01",     "max": "0.5"},
            "noise_factor":                 {"min": "0.05",     "max": "0.5"},
            "momentum":                     {"min": "0.8",      "max": "0.99"},
            "grad_clip":                    {"min": "0.1",      "max": "10.0"},
            "beta":                         {"min": "0.1",      "max": "5.0"},
            "val_split":                    {"min": "0.1",      "max": "0.3"},
            # ── Centroid clustering ────────────────────────────────── #
            "tol":                          {"min": "0.00001",  "max": "0.01"},
            "reassignment_ratio":           {"min": "0.001",    "max": "0.1"},
            "svm_tol":  {"min": "0.0001",  "max": "0.1"}, 
            # ── Density clustering ─────────────────────────────────── #
            "eps":                          {"min": "0.1",      "max": "5.0"},
            "xi":                           {"min": "0.01",     "max": "0.5"},
            "min_cluster_size_optics":      {"min": "0.01",     "max": "0.5"},
            "cluster_selection_epsilon":    {"min": "0.0",      "max": "5.0"},
            "alpha":                        {"min": "0.5",      "max": "2.0"},
            # ── Hierarchical clustering ────────────────────────────── #
            "threshold":                    {"min": "0.1",      "max": "2.0"},
            # ── Other clustering ───────────────────────────────────── #
            "bandwidth":                    {"min": "0.1",      "max": "10.0"},
            "damping":                      {"min": "0.5",      "max": "0.99"},
            "preference":                   {"min": "-100.0",   "max": "0.0"},
            # ── GMM clustering ─────────────────────────────────────── #
            "reg_covar":                    {"min": "0.0000001","max": "0.001"},
            "weight_concentration_prior":   {"min": "0.001",    "max": "1.0"},
            "mean_precision_prior":         {"min": "0.001",    "max": "1.0"},
            "degrees_of_freedom_prior":     {"min": "1.0",      "max": "100.0"},
            # ── Fuzzy clustering ───────────────────────────────────── #
            "m":                            {"min": "1.1",      "max": "4.0"},
            "error":                        {"min": "0.000001", "max": "0.001"},
            # ── Regression / SVM ──────────────────────────────────── #
            "C":                            {"min": "0.001",    "max": "100.0"},
            "l1_ratio":                     {"min": "0.0",      "max": "1.0"},
            "coef0":                        {"min": "0.0",      "max": "10.0"},
            "nu":                           {"min": "0.1",      "max": "0.9"},
            "epsilon":                      {"min": "0.01",     "max": "1.0"},
            "intercept_scaling":            {"min": "0.1",      "max": "10.0"},
        }

        INT_PARAMS = {
            # ── Deep learning ──────────────────────────────────────── #
            "batch_size":           {"min": "16",  "max": "128"},
            "latent_dim":           {"min": "4",   "max": "64"},
            # ── Centroid / hierarchical / other / GMM ─────────────── #
            "n_clusters":           {"min": "2",   "max": "20"},
            "n_clusters_birch":     {"min": "2",   "max": "20"},
            "n_components":         {"min": "2",   "max": "20"},
            "max_iter":             {"min": "100", "max": "1000"},
            "max_iter_ap":          {"min": "100", "max": "500"},
            "n_init":               {"min": "1",   "max": "20"},
            "branching_factor":     {"min": "20",  "max": "100"},
            "convergence_iter":     {"min": "5",   "max": "30"},
            "n_neighbors":          {"min": "1",   "max": "50"},
            "min_bin_freq":         {"min": "1",   "max": "10"},
            # ── Density clustering ─────────────────────────────────── #
            "min_samples":          {"min": "2",   "max": "50"},
            "min_cluster_size":     {"min": "2",   "max": "50"},
            "min_samples_hdbscan":  {"min": "2",   "max": "50"},
            # ── Regression / SVM / KNN ────────────────────────────── #
            "degree":               {"min": "2",   "max": "5"},
            "leaf_size":            {"min": "10",  "max": "100"},
            "p":                    {"min": "1",   "max": "5"},
        }

        CATEGORICAL_PARAMS = {
            # ── Deep learning activations ──────────────────────────── #
            "activation":           ACTIVATIONS,
            "encoder_activation":   ACTIVATIONS,
            "decoder_activation":   ACTIVATIONS,
            "output_activation":    ACTIVATIONS + ["none"],
            # ── Deep learning misc ─────────────────────────────────── #
            "noise_type":           ["gaussian", "salt_pepper", "zero_masking", "none"],
            "weight_init":          ["xavier", "kaiming", "normal", "orthogonal",
                                     "xavier_uniform", "kaiming_uniform"],
            "bias_init":            ["zeros", "normal"],
            "loss_function":        ["mse", "mae", "huber"],
            "learning_method":      ["backprop", "forward_forward", "cafo"],
            "pooling":              ["last", "mean", "max"],
            "nonlinearity":         ["tanh", "relu"],
            "optimizer":            ["adam", "adamw", "sgd", "rmsprop",
                                     "adagrad", "adadelta", "adamax"],
          
            # ── Layer dims (used only when value=true) ─────────────── #
            "hidden_dims":          encoder_hidden_options,
            "encoder_layers":       encoder_hidden_options,
            "decoder_layers":       decoder_options,
            # ── Centroid clustering ────────────────────────────────── #
            "init":                 ["k-means++", "random"],
            "bisecting_strategy":   ["biggest_inertia", "largest_cluster"],
            "method":               ["alternate", "pam"],

            # ── Density clustering ─────────────────────────────────── #
            "metric":               ["euclidean", "manhattan", "cosine",
                                     "minkowski"],
            "cluster_method":       ["xi", "dbscan"],
            "cluster_selection_method": ["eom", "leaf"],
            # ── Hierarchical clustering ────────────────────────────── #
            "linkage":              ["ward", "complete", "average", "single"],
            "compute_full_tree":    ["auto", "true", "false"],
            # ── Other clustering ───────────────────────────────────── #
            "affinity":             ["rbf", "nearest_neighbors", "cosine"],
            "assign_labels":        ["kmeans", "discretize", "cluster_qr"],
            # ── GMM clustering ─────────────────────────────────────── #
            "covariance_type":      ["full", "tied", "diag", "spherical"],
            "init_params":          ["kmeans", "k-means++", "random",
                                     "random_from_data"],
            "weight_concentration_prior_type": ["dirichlet_process",
                                                "dirichlet_distribution"],
            # ── Regression ────────────────────────────────────────── #
            "penalty":              ["l1", "l2", "elasticnet", "none"],
            "solver":               ["lbfgs", "liblinear", "saga",
                                     "sag", "newton-cg"],
            "multi_class":          ["auto", "ovr", "multinomial"],
            # ── SVM ───────────────────────────────────────────────── #
            "kernel":               ["rbf", "linear", "poly", "sigmoid"],
            "gamma":                ["scale", "auto"],
            "decision_function_shape": ["ovr", "ovo"],
            "loss":                 ["hinge", "squared_hinge",
                                     "epsilon_insensitive",
                                     "squared_epsilon_insensitive"],
            # ── KNN ───────────────────────────────────────────────── #
            "knn_weights":          ["uniform", "distance"],
            "algorithm":            ["auto", "ball_tree", "kd_tree", "brute"],
            
        }

        # Params never meaningful to tune
        SKIP_PARAMS = {
            # ── Deep learning ──────────────────────────────────────── #
            "epochs", "early_stopping", "save_path", "data_path",
            "num_workers", "input_dim", "feature_dim", "output_dim",
            "batch_norm", "encoder_batch_norm", "decoder_batch_norm",
            "bidirectional", "learn_init_hidden",
            "sequence_length", "download_dir",
            # ── Clustering ────────────────────────────────────────── #
            "random_state", "n_jobs", "sample_size", "x_path", "y_path",
            "max_eps",
            "bin_seeding", "cluster_all",
            # ── Regression / SVM / KNN ────────────────────────────── #
            "fit_intercept",        # bool flag
            "include_bias",         # bool flag
            "interaction_only",     # bool flag
            "shrinking",            # bool flag
            "dual",                 # bool flag
            "cache_size",           # infrastructure param
        }

        # ── Value interpretation rules ─────────────────────────────────
        # value = true          → tune using predefined range/options
        # value = [x]           → fixed single value — skip from search space
        # value = [x, y, z]     → tune using exactly those values as options
        # value = "string"      → fixed scalar — skip from search space

        def is_fixed_scalar(value):
            if isinstance(value, list):
                return len(value) == 1
            # raw scalar (int/float/str/bool that isn't True)
            return not isinstance(value, bool) or value is False

        def is_user_list(value):
            return isinstance(value, list) and len(value) > 1

        def is_tune_flag(value):
            return value is True

        def make_param(name, value):
            if name in SKIP_PARAMS:
                logger.info("Skipping (excluded): %s", name)
                return None

            # ── true → use predefined range ───────────────────────── #
            if is_tune_flag(value):
                if name in DOUBLE_PARAMS:
                    return {"name": name, "parameter_type": "double",
                            "feasible_space": DOUBLE_PARAMS[name]}
                if name in INT_PARAMS:
                    return {"name": name, "parameter_type": "int",
                            "feasible_space": INT_PARAMS[name]}
                if name in CATEGORICAL_PARAMS:
                    return {"name": name, "parameter_type": "categorical",
                            "feasible_space": {"list": CATEGORICAL_PARAMS[name]}}
                logger.warning("No predefined range for '%s' — skipping.", name)
                return None

            # ── [x] single value → fixed, skip ───────────────────── #
            if isinstance(value, list) and len(value) == 1:
                logger.info("Skipping (fixed single value): %s = %s", name, value)
                return None

            # ── [x, y, z] → categorical with exactly those values ─── #
            if is_user_list(value):
                return {
                    "name": name,
                    "parameter_type": "categorical",
                    "feasible_space": {"list": [str(v) for v in value]},
                }

            # ── raw scalar → fixed, skip ──────────────────────────── #
            logger.info("Skipping (fixed scalar): %s = %s", name, value)
            return None

        # ── Parse config ───────────────────────────────────────────────
        config = json.loads(args.model_config)
        logger.info("Building search space for model: %s",
                    config.get("model", "unknown"))

        search_space = []
        seen = set()

        def add(name, value):
            if name in seen:
                return
            p = make_param(name, value)
            if p:
                search_space.append(p)
                seen.add(name)

        for section in ["data", "training", "optimizer", "architecture",
                        "noise", "loss",
                        "clustering",
                        "regression", "svm", "knn"]:
            for key, val in config.get(section, {}).items():
                add(key, val)

        logger.info("Final search space: %d parameters.", len(search_space))
        for p in search_space:
            fs = p["feasible_space"]
            display = (f"[{len(fs['list'])} options] {fs['list'][:3]}..."
                       if "list" in fs else fs)
            logger.info("  → %-30s %-12s %s",
                        p["name"], p["parameter_type"], display)

        os.makedirs(os.path.dirname(args.search_space) or ".", exist_ok=True)
        with open(args.search_space, "w") as f:
            json.dump(search_space, f, indent=2)

        logger.info("Search space written to %s", args.search_space)

    args:
      - --model_config
      - {inputValue: model_config}
      - --max_n_layers
      - {inputValue: max_n_layers}
      - --search_space
      - {outputPath: search_space}
